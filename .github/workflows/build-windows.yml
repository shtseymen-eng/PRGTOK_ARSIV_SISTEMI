name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pdfplumber Pillow pandas openpyxl pytesseract pdf2image pymupdf pyinstaller

      - name: Install Tesseract via choco
        run: |
          choco install tesseract -y --no-progress
          refreshenv
          echo "Tesseract installed at:"
          dir "C:\Program Files\Tesseract-OCR\"

      - name: Install Turkish language for Tesseract
        run: |
          $tessdata = "C:\Program Files\Tesseract-OCR\tessdata"
          $url = "https://github.com/tesseract-ocr/tessdata/raw/main/tur.traineddata"
          Invoke-WebRequest -Uri $url -OutFile "$tessdata\tur.traineddata"
          echo "Turkish language data installed"

      - name: Download Poppler
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip"
          Invoke-WebRequest -Uri $url -OutFile "poppler.zip"
          Expand-Archive poppler.zip -DestinationPath "C:\pop" -Force
          dir "C:\pop"

      - name: Build EXE with PyInstaller
        shell: cmd
        run: >
          pyinstaller --noconfirm --onefile --windowed
          --name PRGTOK_ARSIV_SISTEMI
          --icon assets/app_icon.ico
          --add-data "assets;assets"
          --add-data "main_paned.py;."
          --add-data "C:\Program Files\Tesseract-OCR;tesseract"
          --add-data "C:\pop\poppler-24.08.0\Library\bin;poppler/bin"
          --hidden-import pytesseract
          --hidden-import pdf2image
          --hidden-import fitz
          main.py

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Setup installer
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\kurulum.iss"'

      - name: Surum numarasini oku
        id: version
        shell: pwsh
        run: |
          $ver = python -c "import re; content=open('motor.py').read(); print(re.search(r'SURUM\s*=\s*\"([^\"]+)\"', content).group(1))"
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Upload Setup (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: PRGTOK_Kurulum_v${{ steps.version.outputs.VERSION }}
          path: installer/cikti/PRGTOK_Arsiv_Kurulum_v${{ steps.version.outputs.VERSION }}.exe

      - name: Upload EXE (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: PRGTOK_EXE_v${{ steps.version.outputs.VERSION }}
          path: dist/PRGTOK_ARSIV_SISTEMI.exe
