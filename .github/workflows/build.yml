name: Windows EXE Build

# ── Tetikleyiciler ──────────────────────────────────────────────────────────
on:
  # Elle tetikle (GitHub → Actions → "Run workflow" butonu)
  workflow_dispatch:

  # v1.0.3 gibi bir tag push edilince otomatik çalışır ve Release oluşturur
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Repo'yu indir ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python kur ────────────────────────────────────────────────────
      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Python bağımlılıkları ─────────────────────────────────────────
      - name: Bagimliliklar kuruluyor
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. PyInstaller ile uygulama derle ────────────────────────────────
      - name: PyInstaller - uygulama derleniyor
        run: |
          python -m PyInstaller build/PRGTOK.spec `
            --distpath dist `
            --workpath build/work `
            --noconfirm `
            --log-level WARN

      # ── 5. Inno Setup kur (Chocolatey ile) ───────────────────────────────
      - name: Inno Setup kurulumu
        run: choco install innosetup --yes --no-progress --version 6.3.3

      # ── 6. Kurulum EXE'si oluştur ─────────────────────────────────────────
      - name: Inno Setup - kurulum dosyasi olusturuluyor
        run: |
          New-Item -ItemType Directory -Force -Path dist\installer | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "build\installer.iss"
        shell: pwsh

      # ── 7. EXE'yi artifact olarak yükle (elle tetiklenince) ───────────────
      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: PRGTOK_Kurulum
          path: dist\installer\*.exe
          retention-days: 30

      # ── 8. GitHub Release oluştur (tag push edilince) ─────────────────────
      - name: GitHub Release olustur
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: PRGTOK Arsiv Sistemi ${{ github.ref_name }}
          body: |
            ## PRGTOK Arşiv Sistemi — ${{ github.ref_name }}

            ### Kurulum
            1. `PRGTOK_Kurulum_*.exe` dosyasını indirin
            2. Yönetici olarak çalıştırın
            3. Kurulum tamamlanınca Tesseract OCR otomatik indirilir (yoksa)

            ### Gereksinimler
            - Windows 10/11 64-bit
            - İnternet bağlantısı (ilk kurulumda Tesseract için)
          files: dist\installer\*.exe
          draft: false
          prerelease: false
